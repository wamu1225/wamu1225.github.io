    <p>このモジュールで学ぶこと

「1クラス30人の身長を測るだけで、全国平均が推測できる」——なぜそんなことが可能なのでしょうか？その答えが正規分布と中心極限定理（CLT）です。この2つは、少ないデータから母集団全体を推測するための理論的な土台です。

 統計学のゴール：「スプーン一杯の味見」のたとえ

私たちが統計学を使うのは、「スプーン一杯の味見から、巨大な鍋全体の味を突き止めたい」からです。

母集団（鍋全体）：本当に知りたい対象（全国民、全製品ロットなど）。
標本（スプーン一杯）：今、手元にあるデータ。母集団からランダムに取り出したもの。
推測（ゴール）：標本に混じる「たまたまの誤差」に騙されず、母数（真の値。 という記号で表します）を見抜くこと。

正規分布：自然界の「鐘の形」
