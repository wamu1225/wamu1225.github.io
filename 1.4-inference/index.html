    <h1>推定・検定の理論的背景</h1>
    <p>このモジュールで学ぶこと

「P値が 0.03 です——この薬は効果がありますか？」この質問に正確に答えるには、P値の意味を深く理解する必要があります。このモジュールでは、P値の正しい解釈・2種類の誤り・そして「本物の効果を見逃さない」確率（検出力）の設計方法を学びます。

 「無実を前提とした裁判」のような仮説検定

仮説検定は法廷の裁判によく似ています。
帰無仮説 （無実の仮定）：「薬の効果はゼロだ（差がない）」——まず無実と仮定してスタート
対立仮説 （証明したいこと）：「薬に本当の効果がある（差がある）」
P値：「無実と仮定したとき、今回の証拠（データ）以上に不利な状況が偶然起きる確率」
有意水準 ：「この確率がこれ以下なら有罪と判断する」という基準（通常 5%）

P値が小さい＝「無実なら滅多に起きないことが起きた」＝無実という仮定が疑わしい、ということです。
