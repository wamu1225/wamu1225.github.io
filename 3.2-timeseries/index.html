    <h1>時系列解析</h1>
    <p>このモジュールで学ぶこと

「昨日の気温が高かったから、今日のアイス売上も多いだろう」——このように過去が未来に影響するデータの分析が時系列解析です。このモジュールでは、データの中に潜む「時間のルール」（トレンド・季節性・自己相関）を発見し、ARIMAモデルで未来を予測する方法を学びます。

 アイスクリーム売上には「3つのルール」が隠れている

あるアイスクリームショップの月次売上（万円）を見てみましょう：

1月：150万円（冬——低い）
7月：520万円（夏——ピーク）
翌1月：165万円（昨年より少し増えた）

このデータには3つのパターンが混じっています：
トレンド：年々売上が少しずつ伸びている（健康ブームの影響）
季節性：夏は3倍以上売れ、冬は落ち込む（1年周期のパターン）
自己相関：先週の売上が良いと今週も良い傾向がある

時系列解析では、これらのパターンを数式で捉えて未来を...</p>
