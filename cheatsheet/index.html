  <h1 style="font-size:1.6rem;font-weight:700;border-bottom:2px solid #2563eb;padding-bottom:8px;margin-bottom:20px">公式集</h1>
  <p style="color:#555;margin-bottom:24px">統計検定準1級の重要公式を分野別にまとめています。確率分布・推定・検定・回帰分析・主成分分析・ベイズ統計など試験で頻出の公式を網羅しています。</p>
  <h2 style="font-size:1.2rem;font-weight:700;margin:20px 0 8px">正規分布の確率密度関数</h2>
  <p style="color:#444">正規分布は平均μ・分散σ²で定まる釣り鐘型の分布です。</p>
  <h2 style="font-size:1.2rem;font-weight:700;margin:20px 0 8px">最尤推定法（MLE）</h2>
  <p style="color:#444">尤度関数L(θ)を最大化するθを推定値とする手法です。</p>
  <h2 style="font-size:1.2rem;font-weight:700;margin:20px 0 8px">AIC（赤池情報量規準）</h2>
  <p style="color:#444">AIC = -2×最大対数尤度 + 2×パラメータ数。値が小さいほど良いモデルです。</p>
  <h2 style="font-size:1.2rem;font-weight:700;margin:20px 0 8px">回帰分析</h2>
  <p style="color:#444">最小二乗法でy = β0 + β1x + εの係数を推定します。</p>
